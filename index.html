<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
    <title>Conversor de Moedas</title>
</head>

<body>
    <img id="gif" src="assets/logo.gif" alt="Logo-img">
 <div id="geral"><h1>Programado por: <b>Adriel Felix</b></h1></div>


    <main>
        <section class=tabela-superior>
            <label id="label1">
                Converter <b>de</b>
                <select id=select1>
                    <option>
                        R$ Real Brasileiro
                    </option>
                </select>
            </label>

            <label id="label2">
                Converter <b>para</b>
                <select id="select2">
                    <option value="dolar">
                        US$ Dólar Americano
                    </option>

                    <option value="euro">
                        € Euro
                    </option>

                    <option value="libra">
                        £ Libra 
                    </option>

                    <option value="biticoin">
                        ₿ Biticoin
                    </option>
                </select>
            </label>

            <label id="label3">
                Valor

                <input class="inputValue" placeholder="R$ 0,00" type="number">

            </label>

            <button class=button>
                <b>Converter</b>
            </button>
        </section>

       <div class="tabela-inferior">
        <label id="brasil">
            <img  class="brasil" src="assets/brasil 2.png" alt="Brasil.img">
           <p class="real"> Real</p>
            <p id="paragrafo1"><b id="b1">R$ 0,00</b></p>
        </label>

         <img id="seta" src="assets/Vector (1).png">
        <label class="label4">
            <img class="estados-unidos" src="assets/estados-unidos (1) 1.png" alt="Estados Unidos.img">
            <p id="money-Us">Dólar Americano</p>
            <p><b class="us">US$ 0,00</b></p>
        </label>
       </div>
    </main>
    
</body>

</html>
